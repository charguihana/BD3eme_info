<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master SQL : ALTER TABLE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        h1 { color: #1a73e8; text-align: center; }
        .question-box { margin-bottom: 20px; padding: 15px; border-left: 5px solid #1a73e8; background: #e8f0fe; }
        .sql-code { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.2em; background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .drop-zone { border-bottom: 2px dashed #fff; color: #ffcc00; display: inline-block; min-width: 80px; text-align: center; }
        .options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; justify-content: center; }
        .option { padding: 10px 20px; background: #1a73e8; color: white; border-radius: 5px; cursor: pointer; transition: transform 0.2s; }
        .option:hover { background: #1557b0; transform: scale(1.05); }
        .score-board { margin-top: 20px; font-weight: bold; }
        .feedback { margin-top: 10px; font-weight: bold; height: 20px; }
        .btn-next { display: none; margin-top: 20px; padding: 10px 20px; background: #34a853; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Challenge SQL : ALTER TABLE</h1>
    <p>Complète la requête SQL en cliquant sur le bon mot-clé correspondant à l'image.</p>
    
    <div id="game-area">
        <div class="question-box" id="instruction">Chargement...</div>
        <div class="sql-code" id="sql-display">
            ALTER TABLE <span id="table-name">...</span> <br>
            <span id="drop-zone" class="drop-zone">_______</span> <span id="params">...</span>;
        </div>
        
        <div class="feedback" id="feedback"></div>
        <div class="options" id="options"></div>
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">Question Suivante</button>
    </div>

    <div class="score-board">
        Score : <span id="score">0</span> / <span id="total">0</span>
    </div>
</div>

<script>
    const questions = [
        { instr: "Ajouter une colonne 'date_naissance' de type DATE dans la table 'eleve'", table: "eleve", params: "date_naissance DATE", correct: "ADD", options: ["ADD", "DROP", "MODIFY", "CHANGE"] },
        { instr: "Supprimer la colonne 'moyenne' de la table 'inscription'", table: "inscription", params: "COLUMN moyenne", correct: "DROP", options: ["REMOVE", "DROP", "DELETE", "ALTER"] },
        { instr: "Modifier le type de la colonne 'telephone' en VARCHAR(20) (Syntaxe MySQL)", table: "eleve", params: "telephone VARCHAR(20)", correct: "MODIFY", options: ["CHANGE", "RENAME", "MODIFY", "ALTER"] },
        { instr: "Renommer 'date_naissance' en 'dt_naissance'", table: "eleve", params: "COLUMN date_naissance TO dt_naissance", correct: "RENAME", options: ["CHANGE", "RENAME", "MODIFY", "MOVE"] },
        { instr: "Ajouter une clé primaire 'pk_classe' sur 'id_classe'", table: "classe", params: "CONSTRAINT pk_classe PRIMARY KEY (id_classe)", correct: "ADD", options: ["CREATE", "ADD", "SET", "ENABLE"] },
        { instr: "Désactiver la contrainte 'fk_inscription_eleve'", table: "inscription", params: "CONSTRAINT fk_inscription_eleve", correct: "DISABLE", options: ["STOP", "OFF", "DISABLE", "DROP"] }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const q = questions[currentQ];
        document.getElementById('instruction').innerText = q.instr;
        document.getElementById('table-name').innerText = q.table;
        document.getElementById('params').innerText = q.params;
        document.getElementById('drop-zone').innerText = "_______";
        document.getElementById('feedback').innerText = "";
        document.getElementById('btn-next').style.display = "none";
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";
        q.options.sort(() => Math.random() - 0.5).forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => checkAnswer(opt);
            optionsDiv.appendChild(div);
        });
        document.getElementById('total').innerText = questions.length;
    }

    function checkAnswer(choice) {
        const q = questions[currentQ];
        const feedback = document.getElementById('feedback');
        if (choice === q.correct) {
            feedback.innerText = "✅ Bravo ! C'est correct.";
            feedback.style.color = "green";
            document.getElementById('drop-zone').innerText = choice;
            score++;
            document.getElementById('score').innerText = score;
            document.getElementById('btn-next').style.display = "block";
            document.getElementById('options').innerHTML = "";
        } else {
            feedback.innerText = "❌ Raté ! Réessaie.";
            feedback.style.color = "red";
        }
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < questions.length) {
            loadQuestion();
        } else {
            document.getElementById('game-area').innerHTML = `<h2>🎉 Terminé ! Ton score final est de ${score} / ${questions.length}</h2>`;
        }
    }

    loadQuestion();
</script>

</body>
</html>
